apiVersion: 1

groups:
  - orgId: 1
    name: neki-log-alerts
    folder: Neki Alerts
    interval: 1m
    rules:
      - uid: high-error-rate
        title: "High Error Rate Detected"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({project="neki-ecommerce", level="ERROR"} [5m]))'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  reducer:
                    type: last
        for: 2m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: "More than 10 ERROR logs detected in the last 5 minutes across all services"
          description: "Total error count: {{ $values.A }}"

      - uid: service-error-spike
        title: "Service Error Spike"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum by (service) (count_over_time({project="neki-ecommerce", level="ERROR"} [5m]))'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  reducer:
                    type: last
        for: 1m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.service }} has more than 5 errors in the last 5 minutes"
          description: "Error count for {{ $labels.service }}: {{ $values.A }}"

      - uid: no-logs-received
        title: "No Logs Received from Service"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: 'count by (service) (count_over_time({project="neki-ecommerce"} [10m]))'
              queryType: range
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  reducer:
                    type: last
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: "No logs received from {{ $labels.service }} in the last 10 minutes — service may be down"
